server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/plant_cultivation?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000  # 24 hours

logging:
  level:
    com.plantcultivation: debug
    com.zaxxer.hikari: DEBUG
    org.springframework.jdbc: DEBUG
